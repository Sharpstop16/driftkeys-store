// ── REPLACE THESE WHEN YOU HAVE YOUR STOREFRONT TOKEN ──
const SHOPIFY_DOMAIN = 'driftkeys.myshopify.com';
// Checkout uses cart permalink — no token needed
// ───────────────────────────────────────────────────────

let currentFilter = 'all';
let currentProduct = null;
let cart = [];

function filtered() {
  return currentFilter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.type === currentFilter);
}

function renderGrid() {
  const list = filtered();
  document.getElementById('count-label').textContent = list.length + ' product' + (list.length !== 1 ? 's' : '');
  document.getElementById('product-grid').innerHTML = list.map(p => `
    <div class="product-card" onclick="showDetail('${p.id}')">
      ${p.stock <= 3 ? `<span class="low-stock-badge">Only ${p.stock} left</span>` : ''}
      <img src="${p.img}" alt="${p.title}" loading="lazy">
      <div class="card-body">
        <p class="card-title">${p.title}</p>
        <p class="card-price">$${p.price.toFixed(2)}</p>
      </div>
    </div>
  `).join('');
}

function showDetail(id) {
  currentProduct = PRODUCTS.find(p => p.id === id);
  if (!currentProduct) return;
  document.getElementById('listing-page').style.display = 'none';
  document.getElementById('detail-page').style.display = 'block';
  document.getElementById('d-img').src = currentProduct.img;
  document.getElementById('d-img').alt = currentProduct.title;
  document.getElementById('d-vendor').textContent = currentProduct.vendor;
  document.getElementById('d-title').textContent = currentProduct.title;
  document.getElementById('d-price').textContent = '$' + currentProduct.price.toFixed(2);
  document.getElementById('d-desc').textContent = currentProduct.desc;
  const stockEl = document.getElementById('d-stock');
  if (currentProduct.stock <= 3) {
    stockEl.textContent = 'Only ' + currentProduct.stock + ' left in stock — order soon';
    stockEl.classList.add('low');
  } else {
    stockEl.textContent = 'In stock';
    stockEl.classList.remove('low');
  }
  const btn = document.getElementById('add-to-cart-btn');
  btn.textContent = 'Add to cart';
  btn.disabled = false;
  window.scrollTo(0, 0);
}

function showListing() {
  document.getElementById('detail-page').style.display = 'none';
  document.getElementById('listing-page').style.display = 'block';
  currentProduct = null;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
});

// CART
function addCurrentToCart() {
  if (!currentProduct) return;
  const existing = cart.find(i => i.id === currentProduct.id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...currentProduct, qty: 1 });
  }
  updateCartUI();
  showToast(currentProduct.title.split('–')[0].trim() + ' added to cart');
  const btn = document.getElementById('add-to-cart-btn');
  btn.textContent = 'Added ✓';
  setTimeout(() => { btn.textContent = 'Add to cart'; }, 1500);
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  const countEl = document.getElementById('cart-count');
  countEl.textContent = total;
  countEl.classList.toggle('visible', total > 0);

  const itemsEl = document.getElementById('cart-items');
  const footerEl = document.getElementById('cart-footer');

  if (cart.length === 0) {
    itemsEl.innerHTML = '<p class="cart-empty">Your cart is empty</p>';
    footerEl.style.display = 'none';
    return;
  }

  footerEl.style.display = 'block';
  itemsEl.innerHTML = cart.map((item, idx) => `
    <div class="cart-item">
      <img src="${item.img}" alt="${item.title}">
      <div>
        <p class="cart-item-title">${item.title}</p>
        <p class="cart-item-price">$${item.price.toFixed(2)}</p>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
        </div>
      </div>
      <button class="remove-item" onclick="removeItem(${idx})">×</button>
    </div>
  `).join('');

  const cartTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cart-total').textContent = '$' + cartTotal.toFixed(2);
}

function changeQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  updateCartUI();
}

function removeItem(idx) {
  cart.splice(idx, 1);
  updateCartUI();
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
}

function goToCheckout() {
  if (cart.length === 0) return;

  const btn = document.querySelector('.checkout-btn');
  btn.textContent = 'Redirecting…';
  btn.disabled = true;

  // Build Shopify cart permalink — works without Storefront API token
  const items = cart.map(i => `${i.variantId}:${i.qty}`).join(',');
  const checkoutUrl = `https://${SHOPIFY_DOMAIN}/cart/${items}`;
  window.location.href = checkoutUrl;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

renderGrid();
</script>
